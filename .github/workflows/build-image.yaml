name: build-image

# Builds the CV container (Dockerfile -> ghcr.io/tarensanders/cv) and pushes it.
# Only runs when the image inputs change, so the targets workflow can just pull.
on:
  push:
    branches:
      - main
      - master
    paths:
      - Dockerfile
      - renv.lock
      - cv/awesome-cv.tex
      - .github/workflows/build-image.yaml
  workflow_dispatch:

env:
  IMAGE: ghcr.io/tarensanders/cv

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          secrets: |
            github_pat=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
